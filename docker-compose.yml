services:
  tor:
    build: .
    container_name: proxyforge-tor
    restart: unless-stopped
    networks:
      - proxy_net
    ports:
      - "${SOCKS_PORT:-1080}:9050"

  privoxy:
    image: vimagick/privoxy
    container_name: proxyforge-http
    restart: unless-stopped
    depends_on:
      - tor
    networks:
      - proxy_net
    ports:
      - "${HTTP_PORT:-8080}:8118"

networks:
  proxy_net: